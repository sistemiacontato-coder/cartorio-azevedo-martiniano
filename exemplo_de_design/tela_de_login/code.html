<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Azevedo Martiniano</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700&amp;display=swap" rel="stylesheet"/>

<style>

            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#0a2342",
                        "inverse-primary": "#b2c7ef",
                        "error": "#ba1a1a",
                        "surface-variant": "#d8e3fa",
                        "surface": "#f9f9ff",
                        "background": "#f9f9ff",
                        "surface-container-highest": "#d8e3fa",
                        "secondary-container": "#fed488",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#261900",
                        "secondary-fixed-dim": "#e9c176",
                        "on-primary-fixed-variant": "#324768",
                        "on-tertiary-fixed": "#191c1d",
                        "on-secondary-fixed-variant": "#5d4201",
                        "secondary-fixed": "#ffdea5",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#768baf",
                        "tertiary-fixed-dim": "#c5c7c8",
                        "on-primary-fixed": "#021c3a",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#d5e3ff",
                        "tertiary": "#0a0d0e",
                        "on-secondary-container": "#785a1a",
                        "inverse-surface": "#263142",
                        "on-surface-variant": "#44474e",
                        "surface-bright": "#f9f9ff",
                        "surface-container-low": "#f0f3ff",
                        "surface-tint": "#4a5f81",
                        "outline": "#74777e",
                        "inverse-on-surface": "#ebf1ff",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#cfdaf1",
                        "tertiary-fixed": "#e1e3e4",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#111c2c",
                        "primary": "#000d22",
                        "secondary": "#775a19",
                        "surface-container-high": "#dee8ff",
                        "on-tertiary-fixed-variant": "#454748",
                        "surface-container": "#e7eeff",
                        "tertiary-container": "#202324",
                        "on-tertiary-container": "#888a8b",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#b2c7ef",
                        "outline-variant": "#c4c6cf",
                        "on-surface": "#111c2c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "8px",
                        "container-max": "1280px",
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-lg": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Manrope"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],

                    "fontSize": {

                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],

<body class="bg-background min-h-screen flex items-center justify-center p-4">
<!-- Suppressed TopNavBar and SideNavBar due to "Linear/Transactional: Login" rule -->
<div class="w-full max-w-md">
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-8 shadow-sm">
<!-- Brand Header -->
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Azevedo Martiniano</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Portal AI - Acesso Restrito</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="email">Usuário ou E-mail</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-xl">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder-outline-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow duration-200" id="email" name="email" placeholder="seu@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="password">Senha</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder-outline-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-label-md text-label-md text-on-surface-variant" for="remember-me">
                            Lembrar-me
                        </label>
</div>
<div class="text-sm">
<a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors duration-200" href="#">
                            Esqueceu a senha?
                        </a>
</div>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded bg-primary text-on-primary font-label-md text-label-md hover:bg-primary-container transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                        Acessar Portal
                    </button>
</div>
</form>
<div class="mt-6 text-center">
<p class="font-label-sm text-label-sm text-outline">
                    Acesso restrito a membros autorizados do Cartório Azevedo Martiniano.
                </p>
</div>
</div>
</div>
</body></html>
