<!DOCTYPE html>
<html lang="pt-BR">
<head>

                        "inverse-surface": "#263142",
                        "inverse-on-surface": "#ebf1ff",
                        "outline": "#74777e",
                        "outline-variant": "#c4c6cf",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#785a1a",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "tertiary": "#0a0d0e",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#202324",
                        "on-tertiary-container": "#888a8b",
                        "primary-fixed": "#d5e3ff",
                        "primary-fixed-dim": "#b2c7ef",
                        "secondary-fixed": "#ffdea5",
                        "secondary-fixed-dim": "#e9c176",
                        "tertiary-fixed": "#e1e3e4",
                        "tertiary-fixed-dim": "#c5c7c8",
                        "on-primary-fixed": "#021c3a",
                        "on-primary-fixed-variant": "#324768",
                        "on-secondary-fixed": "#261900",
                        "on-secondary-fixed-variant": "#5d4201",
                        "on-tertiary-fixed": "#191c1d",
                        "on-tertiary-fixed-variant": "#454748"
                    },
                    borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
                    spacing: { unit: "8px", "container-max": "1280px", "margin-mobile": "16px", "margin-desktop": "40px", gutter: "24px" },
                    fontFamily: {

                        "body-lg": ["Inter"], "body-md": ["Inter"], "label-md": ["Inter"], "label-sm": ["Inter"]
                    },
                    fontSize: {
                        "headline-xl": ["40px", { lineHeight: "48px", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "headline-lg-mobile": ["24px", { lineHeight: "32px", fontWeight: "600" }],
                        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
                        "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],

                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal; font-style: normal; font-size: 24px;
            line-height: 1; letter-spacing: normal; text-transform: none;
            display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr;
            -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Animação sutil de entrada */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-delay-100 { animation-delay: 0.1s; opacity: 0; }
        .animate-delay-200 { animation-delay: 0.2s; opacity: 0; }

        /* Linha decorativa dourada */
        .gold-line::after {
            content: '';
            display: block;
            width: 48px;
            height: 2px;
            background: #775a19;
            margin: 16px auto 0;
            border-radius: 1px;
        }

        /* Focus glow para inputs */
        .input-focus-glow:focus {
            box-shadow: 0 0 0 3px rgba(0, 13, 34, 0.08);
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4 antialiased">

    <!-- Padrão decorativo de fundo -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-0 right-0 w-96 h-96 bg-surface-container rounded-full opacity-60 -translate-y-1/2 translate-x-1/3"></div>
        <div class="absolute bottom-0 left-0 w-80 h-80 bg-surface-dim rounded-full opacity-30 translate-y-1/3 -translate-x-1/4"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <!-- Card de Login -->
        <div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-8 md:p-10 shadow-[0_10px_25px_-5px_rgba(10,35,66,0.05)] animate-fade-in-up">

            <!-- Cabeçalho com Logo -->
            <div class="text-center mb-10 gold-line">
                <div class="w-24 h-24 mx-auto mb-5 rounded-full overflow-hidden border-2 border-outline-variant shadow-sm">
                    <img src="exemplo_de_design/logo-cartorio-azevedo-martiniano.jpg" alt="Logo Cartório Azevedo Martiniano" class="w-full h-full object-cover"/>
                </div>
                <h1 class="font-headline-lg text-headline-lg text-primary mb-1">Azevedo Martiniano</h1>
                <p class="font-label-md text-label-md text-on-surface-variant tracking-wider uppercase">Área de Membros</p>
            </div>

            <!-- Formulário de Login -->
            <form id="login-form" class="space-y-5 animate-fade-in-up animate-delay-100" onsubmit="handleLogin(event)">
                <!-- Campo E-mail -->
                <div>
                    <label class="block font-label-md text-label-md text-on-surface mb-2" for="login-email">Usuário ou E-mail</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline text-xl">person</span>
                        </div>
                        <input
                            class="input-focus-glow block w-full pl-10 pr-3 py-3 border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder-outline focus:outline-none focus:border-primary transition-all duration-200"
                            id="login-email" name="email" placeholder="seu@email.com ou usuário" required type="text"/>
                    </div>
                </div>

                <!-- Campo Senha -->
                <div>
                    <label class="block font-label-md text-label-md text-on-surface mb-2" for="login-password">Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline text-xl">lock</span>
                        </div>
                        <input
                            class="input-focus-glow block w-full pl-10 pr-10 py-3 border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder-outline focus:outline-none focus:border-primary transition-all duration-200"
                            id="login-password" name="password" placeholder="••••••••" required type="password"/>
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors">
                            <span id="password-toggle-icon" class="material-symbols-outlined text-xl">visibility_off</span>
                        </button>
                    </div>
                </div>

                <!-- Lembrar-me + Esqueci Senha -->
                <div class="flex items-center justify-between pt-1">
                    <div class="flex items-center">
                        <input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded" id="remember-me" name="remember-me" type="checkbox"/>
                        <label class="ml-2 block font-label-md text-label-md text-on-surface-variant" for="remember-me">Lembrar-me</label>
                    </div>
                    <a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors duration-200" href="#">Esqueceu a senha?</a>
                </div>

                <!-- Botão Entrar -->
                <div class="pt-2">
                    <button id="login-btn" class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded bg-primary text-on-primary font-label-md text-label-md hover:bg-primary-container transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                        <span id="login-btn-text">Acessar Portal</span>
                        <span id="login-spinner" class="hidden animate-spin">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                        </span>
                    </button>
                </div>
            </form>

            <!-- Rodapé -->
            <div class="mt-8 text-center animate-fade-in-up animate-delay-200">
                <p class="font-label-sm text-label-sm text-outline">
                    Acesso restrito a membros autorizados do Cartório Azevedo Martiniano.
                </p>
            </div>
        </div>

        <!-- Segurança badge -->
        <div class="mt-6 flex items-center justify-center gap-2 text-outline animate-fade-in-up animate-delay-200">
            <span class="material-symbols-outlined text-sm">lock</span>
            <span class="font-label-sm text-label-sm">Conexão segura • SSL Protegido</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        initFirebase();

        // --- Credenciais de acesso (padrão inicial) ---
        const USUARIOS = [
            { nome: 'Cyro',                    usuario: 'cyro',                   email: 'contatoazevedomartiniano+cyro@gmail.com',                   senha: 'c1c2c3@!CAM_423709', role: 'membro' },
            { nome: 'Davi',                    usuario: 'davi',                   email: 'contatoazevedomartiniano+davi@gmail.com',                   senha: 'c1c2c3@!CAM_065142', role: 'membro' },
            { nome: 'Fernando',                usuario: 'fernando',               email: 'contatoazevedomartiniano+fernando@gmail.com',               senha: 'c1c2c3@!CAM_832041', role: 'membro' },
            { nome: 'José',                    usuario: 'jose',                   email: 'contatoazevedomartiniano+jose@gmail.com',                   senha: 'c1c2c3@!CAM_530178', role: 'membro' },
            { nome: 'Alice Magalhães',         usuario: 'alicemagalhaes',         email: 'contatoazevedomartiniano+alicemagalhaes@gmail.com',         senha: 'c1c2c3@!CAM_730528', role: 'membro' },
            { nome: 'Daniel Botelho',          usuario: 'danielbotelho',          email: 'contatoazevedomartiniano+danielbotelho@gmail.com',          senha: 'c1c2c3@!CAM_965201', role: 'membro' },
            { nome: 'Izabelle Gonçalves',      usuario: 'izabellegoncalves',      email: 'contatoazevedomartiniano+izabellegoncalves@gmail.com',      senha: 'c1c2c3@!CAM_741095', role: 'membro' },
            { nome: 'Maria Eduarda Rodrigues', usuario: 'mariaeduardarodrigues',  email: 'contatoazevedomartiniano+mariaeduardarodrigues@gmail.com',  senha: 'c1c2c3@!CAM_584627', role: 'membro' },
            { nome: 'Raimundo Guimarães',      usuario: 'raimundoguimaraes',      email: 'contatoazevedomartiniano+raimundoguimaraes@gmail.com',      senha: 'c1c2c3@!CAM_874305', role: 'membro' },
            { nome: 'Rebeca Moda',             usuario: 'rebecamoda',             email: 'contatoazevedomartiniano+rebecamoda@gmail.com',             senha: 'c1c2c3@!CAM_406921', role: 'membro' },
            { nome: 'Sâmela Lima',             usuario: 'samelalima',             email: 'contatoazevedomartiniano+samelalima@gmail.com',             senha: 'c1c2c3@!CAM_826174', role: 'membro' },
            { nome: 'Victor Level',            usuario: 'victorlevel',            email: 'contatoazevedomartiniano+victorlevel@gmail.com',            senha: 'c1c2c3@!CAM_984625', role: 'membro' },
            { nome: 'Master',                  usuario: 'master',                 email: 'master',                                                   senha: '123123',             role: 'master'  }
        ];

        // Inicializa usuários no localStorage (padrão na primeira vez)
        if (!localStorage.getItem('cartorio_users')) {
            localStorage.setItem('cartorio_users', JSON.stringify(USUARIOS));
        }

        // Toggle visibilidade da senha
        function togglePassword() {
            const input = document.getElementById('login-password');
            const icon = document.getElementById('password-toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }

        // Remove mensagem de erro anterior
        function limparErro() {
            const erroExistente = document.getElementById('login-error');
            if (erroExistente) erroExistente.remove();
        }

        // Exibe mensagem de erro
        function mostrarErro(msg) {
            limparErro();
            const form = document.getElementById('login-form');
            const div = document.createElement('div');
            div.id = 'login-error';
            div.className = 'flex items-center gap-2 p-3 rounded bg-error-container text-on-error-container font-label-md text-label-md animate-fade-in-up';
            div.innerHTML = '<span class="material-symbols-outlined text-sm">error</span>' + msg;
            form.insertBefore(div, form.firstChild);
        }

        // Login com validação
        function handleLogin(e) {
            e.preventDefault();
            limparErro();

            const email = document.getElementById('login-email').value.trim();
            const senha = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            const btnText = document.getElementById('login-btn-text');
            const spinner = document.getElementById('login-spinner');

            btn.disabled = true;
            btnText.textContent = 'Verificando...';
            spinner.classList.remove('hidden');

            setTimeout(() => {
                const listaAtual = JSON.parse(localStorage.getItem('cartorio_users') || JSON.stringify(USUARIOS));
                const usuario = listaAtual.find(u => (u.email === email || u.usuario === email) && u.senha === senha);
                if (usuario) {
                    localStorage.setItem('userRole', usuario.role);
                    localStorage.setItem('userEmail', usuario.email);
                    localStorage.setItem('userName', usuario.nome);
                    registrarLogin(usuario.email, usuario.nome);
                    btnText.textContent = 'Acesso concedido!';
                    setTimeout(() => { window.location.href = 'painel.html'; }, 600);
                } else {
                    btn.disabled = false;
                    btnText.textContent = 'Acessar Portal';
                    spinner.classList.add('hidden');
                    mostrarErro('E-mail ou senha incorretos. Tente novamente.');
                }
            }, 1200);
        }
    </script>
</body>
</html>
